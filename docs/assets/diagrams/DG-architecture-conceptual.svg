<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrlight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999999"/>
    </marker>
  </defs>
  <rect width="1400" height="980" fill="#ffffff"/>

  <!-- Title -->
  <text x="30" y="36" font-size="18" font-weight="bold" fill="#1a1a2e">Architecture: Conceptual View</text>
  <text x="30" y="54" font-size="11" font-style="italic" fill="#999999">Sources, the four-boundary spine inside BareCount, and delivery of authoritative state.</text>
  <text x="1370" y="36" font-size="9" fill="#666666" text-anchor="end">DG-architecture-conceptual · v1</text>

  <!-- ============== LEFT COLUMN: SOURCES ============== -->
  <rect x="20" y="80" width="260" height="780" rx="6" fill="#fff2cc" fill-opacity="0.3" stroke="#d6b656" stroke-width="1"/>
  <text x="40" y="105" font-size="13" font-weight="bold" fill="#a08230">DATA SOURCES</text>
  <text x="40" y="120" font-size="9" fill="#666666">Observable external state.</text>

  <!-- Enterprise Systems -->
  <rect x="40" y="140" width="220" height="180" rx="4" fill="#ffffff" stroke="#d6b656" stroke-width="1"/>
  <text x="50" y="160" font-size="11" font-weight="bold" fill="#1a1a2e">Enterprise Systems</text>
  <text x="60" y="180" font-size="10" fill="#444444">ERP (SAP S/4, Oracle)</text>
  <text x="60" y="198" font-size="10" fill="#444444">CRM (Salesforce)</text>
  <text x="60" y="216" font-size="10" fill="#444444">HCM (Workday)</text>
  <text x="60" y="234" font-size="10" fill="#444444">MES (manufacturing)</text>
  <text x="60" y="252" font-size="10" fill="#444444">ITSM (ServiceNow)</text>
  <text x="60" y="270" font-size="10" fill="#444444">Custom databases</text>
  <text x="60" y="288" font-size="9" font-style="italic" fill="#999999">Connect via Reader Flavor</text>
  <text x="60" y="302" font-size="9" font-style="italic" fill="#999999">per source-system type.</text>

  <!-- Third-party / Public -->
  <rect x="40" y="340" width="220" height="120" rx="4" fill="#ffffff" stroke="#d6b656" stroke-width="1"/>
  <text x="50" y="360" font-size="11" font-weight="bold" fill="#1a1a2e">Third-party Sources</text>
  <text x="60" y="380" font-size="10" fill="#444444">Analytics platforms</text>
  <text x="60" y="398" font-size="10" fill="#444444">Marketing systems</text>
  <text x="60" y="416" font-size="10" fill="#444444">Public data</text>
  <text x="60" y="434" font-size="10" fill="#444444">External feeds</text>

  <!-- Standards -->
  <rect x="40" y="480" width="220" height="140" rx="4" fill="#ffffff" stroke="#d6b656" stroke-width="1"/>
  <text x="50" y="500" font-size="11" font-weight="bold" fill="#1a1a2e">Standards</text>
  <text x="60" y="520" font-size="10" fill="#444444">OAGIS (primary)</text>
  <text x="60" y="538" font-size="10" fill="#444444">XBRL · IFRS</text>
  <text x="60" y="556" font-size="10" fill="#444444">US-GAAP · ISO 20022</text>
  <text x="60" y="574" font-size="9" font-style="italic" fill="#999999">Source of vocabulary</text>
  <text x="60" y="588" font-size="9" font-style="italic" fill="#999999">for Business Fields</text>
  <text x="60" y="602" font-size="9" font-style="italic" fill="#999999">and Business Objects.</text>

  <!-- ============== CENTER: BARECOUNT PLATFORM ============== -->
  <rect x="300" y="80" width="780" height="780" rx="6" fill="#dae8fc" fill-opacity="0.2" stroke="#6c8ebf" stroke-width="1"/>
  <text x="320" y="105" font-size="13" font-weight="bold" fill="#6c8ebf">BARECOUNT PLATFORM</text>
  <text x="320" y="120" font-size="9" fill="#666666">Contract-governed semantic runtime. State changes only at four governed boundaries.</text>

  <!-- Source Catalog (control plane, top-left) -->
  <rect x="320" y="140" width="220" height="60" rx="4" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="430" y="160" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Source Catalog</text>
  <text x="430" y="178" font-size="9" fill="#666666" text-anchor="middle">control plane</text>
  <text x="430" y="192" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">Provider · System · Module · Table · Field</text>

  <!-- Contract Registry (control plane, top-right) -->
  <rect x="840" y="140" width="220" height="60" rx="4" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="950" y="160" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Contract Registry</text>
  <text x="950" y="178" font-size="9" fill="#666666" text-anchor="middle">control plane</text>
  <text x="950" y="192" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">SC · AC · OC · CC · MC · IC</text>

  <!-- Source Catalog feeds Reader -->
  <line x1="430" y1="200" x2="430" y2="225" stroke="#999999" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrlight)"/>
  <!-- Contract Registry feeds spine (each boundary) -->
  <line x1="950" y1="200" x2="950" y2="730" stroke="#999999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="960" y="450" font-size="9" font-style="italic" fill="#666666" transform="rotate(90 960 450)">governs every boundary act</text>

  <!-- Connectors / Readers (entry to spine) -->
  <rect x="320" y="230" width="500" height="60" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="570" y="252" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Connectors · Readers (UniBAT)</text>
  <text x="570" y="270" font-size="9" fill="#666666" text-anchor="middle">source-system-agnostic input · business-aware output</text>
  <text x="570" y="284" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">applies Observation Contract; Connection carries tenant credentials</text>

  <!-- Spine starts -->
  <line x1="570" y1="290" x2="570" y2="320" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Admission boundary -->
  <rect x="320" y="320" width="320" height="55" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="480" y="343" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">ADMISSION boundary</text>
  <text x="480" y="362" font-size="9" fill="#666666" text-anchor="middle">Source Contract · Admission Contract · Observation Contract</text>
  <!-- → Source Object -->
  <line x1="640" y1="347" x2="685" y2="347" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="745" cy="347" rx="60" ry="20" fill="#f0f0f0" stroke="#999999" stroke-width="1.5"/>
  <text x="745" y="343" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Source Object</text>
  <text x="745" y="357" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">tenant DB</text>
  <!-- Evidence/Lineage from admission -->
  <line x1="805" y1="347" x2="855" y2="347" stroke="#e57373" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Down to canonical -->
  <line x1="480" y1="375" x2="480" y2="405" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Canonical evaluation boundary -->
  <rect x="320" y="405" width="320" height="55" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="480" y="428" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">CANONICAL EVALUATION</text>
  <text x="480" y="447" font-size="9" fill="#666666" text-anchor="middle">Canonical Contract · Canonical Mapping</text>
  <line x1="640" y1="432" x2="685" y2="432" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="745" cy="432" rx="60" ry="20" fill="#f0f0f0" stroke="#999999" stroke-width="1.5"/>
  <text x="745" y="428" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Canonical Object</text>
  <text x="745" y="442" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">tenant DB</text>
  <line x1="805" y1="432" x2="855" y2="432" stroke="#e57373" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Down -->
  <line x1="480" y1="460" x2="480" y2="490" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Metric evaluation boundary -->
  <rect x="320" y="490" width="320" height="55" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="480" y="513" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">METRIC EVALUATION</text>
  <text x="480" y="532" font-size="9" fill="#666666" text-anchor="middle">Metric Contract · formula over Canonical Fields</text>
  <line x1="640" y1="517" x2="685" y2="517" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="745" cy="517" rx="60" ry="20" fill="#f0f0f0" stroke="#999999" stroke-width="1.5"/>
  <text x="745" y="513" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Metric Snapshot</text>
  <text x="745" y="527" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">tenant DB</text>
  <line x1="805" y1="517" x2="855" y2="517" stroke="#e57373" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Down -->
  <line x1="480" y1="545" x2="480" y2="575" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Action evaluation boundary -->
  <rect x="320" y="575" width="320" height="55" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="480" y="598" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">ACTION EVALUATION</text>
  <text x="480" y="617" font-size="9" fill="#666666" text-anchor="middle">Intervention Contract · terminal-state action</text>
  <line x1="640" y1="602" x2="685" y2="602" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="745" cy="602" rx="60" ry="20" fill="#f0f0f0" stroke="#999999" stroke-width="1.5"/>
  <text x="745" y="598" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Action Object</text>
  <text x="745" y="612" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">tenant DB</text>
  <line x1="805" y1="602" x2="855" y2="602" stroke="#e57373" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Evidence + Lineage cross-cutting column -->
  <rect x="855" y="320" width="200" height="310" rx="4" fill="#fce4ec" fill-opacity="0.6" stroke="#e57373" stroke-width="1.5"/>
  <text x="955" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Evidence + Lineage</text>
  <text x="955" y="362" font-size="9" fill="#666666" text-anchor="middle">proof emission</text>
  <text x="865" y="385" font-size="9" fill="#444444">Per-record Evidence</text>
  <text x="865" y="403" font-size="9" fill="#444444">Per-object Lineage</text>
  <text x="865" y="421" font-size="9" fill="#444444">Emitted at the act</text>
  <text x="865" y="439" font-size="9" fill="#444444">that produces state</text>
  <text x="865" y="465" font-size="9" font-style="italic" fill="#999999">Append-only</text>
  <text x="865" y="479" font-size="9" font-style="italic" fill="#999999">Immutable</text>
  <text x="865" y="493" font-size="9" font-style="italic" fill="#999999">Tenant-scoped</text>
  <text x="865" y="519" font-size="9" font-style="italic" fill="#999999">Foundation Invariant VI:</text>
  <text x="865" y="533" font-size="9" font-style="italic" fill="#999999">Evidence emitted, not</text>
  <text x="865" y="547" font-size="9" font-style="italic" fill="#999999">reconstructed.</text>
  <text x="865" y="600" font-size="9" font-style="italic" fill="#666666">Cross-cutting: emitted</text>
  <text x="865" y="614" font-size="9" font-style="italic" fill="#666666">at every boundary act.</text>

  <!-- Tenant DB at bottom -->
  <rect x="320" y="660" width="740" height="80" rx="6" fill="#f0f0f0" stroke="#999999" stroke-width="1.5"/>
  <text x="690" y="685" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Tenant Database (tbc_{slug}_dev)</text>
  <text x="690" y="703" font-size="10" fill="#666666" text-anchor="middle">execution-time data; one per tenant; written only through governed runtime acts</text>
  <text x="690" y="720" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">SO · CO · MS · AO · Evidence · Lineage · Run records · Connections · Bindings</text>

  <!-- Source state from left to platform (entry arrow) -->
  <line x1="280" y1="260" x2="320" y2="260" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="285" y="252" font-size="9" font-style="italic" fill="#666666">observed</text>

  <!-- Bottom: Tenant DB feeds delivery -->
  <line x1="1060" y1="700" x2="1100" y2="700" stroke="#333333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Platform DB at very bottom -->
  <rect x="320" y="760" width="380" height="80" rx="6" fill="#f0f0f0" stroke="#999999" stroke-width="1.5"/>
  <text x="510" y="785" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Platform Database (bc_platform_dev)</text>
  <text x="510" y="803" font-size="10" fill="#666666" text-anchor="middle">design-time definitions; one per environment</text>
  <text x="510" y="820" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">contracts · catalog · governance state · master data</text>

  <!-- Platform DB feeds catalog and registry -->
  <path d="M 510 760 Q 510 680, 430 200" fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 510 760 Q 700 600, 950 200" fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Right side governance note -->
  <rect x="720" y="760" width="340" height="80" rx="6" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="730" y="780" font-size="10" font-weight="bold" fill="#666666">Governance and Auth</text>
  <text x="730" y="797" font-size="9" fill="#444444">DevHub records authoring acts (sessions, ADRs, change records).</text>
  <text x="730" y="813" font-size="9" fill="#444444">Cognito JWT validated at every backend boundary.</text>
  <text x="730" y="829" font-size="9" fill="#444444">@PlatformOnly() and @TenantScoped() routing in bc-core.</text>

  <!-- ============== RIGHT COLUMN: DELIVERY ============== -->
  <rect x="1100" y="80" width="280" height="780" rx="6" fill="#d5e8d4" fill-opacity="0.3" stroke="#82b366" stroke-width="1"/>
  <text x="1120" y="105" font-size="13" font-weight="bold" fill="#82b366">DELIVERY</text>
  <text x="1120" y="120" font-size="9" fill="#666666">Read-only consumption of authoritative state.</text>

  <!-- bc-portal -->
  <rect x="1120" y="140" width="240" height="60" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1240" y="162" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">bc-portal</text>
  <text x="1240" y="178" font-size="9" fill="#666666" text-anchor="middle">tenant-facing UI</text>
  <text x="1240" y="192" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">read-only over Tenant DB</text>

  <!-- bc-admin -->
  <rect x="1120" y="220" width="240" height="60" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1240" y="242" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">bc-admin</text>
  <text x="1240" y="258" font-size="9" fill="#666666" text-anchor="middle">platform-facing UI</text>
  <text x="1240" y="272" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">embedded docs reader</text>

  <!-- Read APIs -->
  <rect x="1120" y="300" width="240" height="60" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1240" y="322" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Read APIs</text>
  <text x="1240" y="338" font-size="9" fill="#666666" text-anchor="middle">analytics integration</text>
  <text x="1240" y="352" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">JWT-guarded</text>

  <!-- AI visibility -->
  <rect x="1120" y="380" width="240" height="60" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1240" y="402" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a2e">AI Visibility</text>
  <text x="1240" y="418" font-size="9" fill="#666666" text-anchor="middle">advisory output (Conversation surface)</text>
  <text x="1240" y="432" font-size="9" font-style="italic" fill="#999999" text-anchor="middle">read-only over Trust surface</text>

  <!-- Adjacent integration paths -->
  <rect x="1120" y="470" width="240" height="120" rx="4" fill="#ffffff" stroke="#999999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1240" y="492" font-size="11" font-weight="bold" text-anchor="middle" fill="#666666">Adjacent integration paths</text>
  <text x="1240" y="508" font-size="9" fill="#666666" text-anchor="middle">not delivery-plane writes</text>
  <text x="1130" y="528" font-size="9" fill="#444444">AI-triggered authoring</text>
  <text x="1130" y="544" font-size="9" fill="#444444">requires governed authoring act</text>
  <text x="1130" y="566" font-size="9" fill="#444444">Action write-back</text>
  <text x="1130" y="582" font-size="9" fill="#444444">requires external integration governance</text>

  <!-- ============== LEGEND ============== -->
  <rect x="1100" y="630" width="280" height="220" rx="6" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="1115" y="652" font-size="11" font-weight="bold" fill="#666666">LEGEND</text>

  <rect x="1115" y="662" width="14" height="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="1135" y="672" font-size="9" fill="#444444">External system or boundary act</text>

  <rect x="1115" y="678" width="14" height="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="1135" y="688" font-size="9" fill="#444444">Service or runtime component</text>

  <rect x="1115" y="694" width="14" height="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="1135" y="704" font-size="9" fill="#444444">Browser shell or API delivery</text>

  <rect x="1115" y="710" width="14" height="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="1135" y="720" font-size="9" fill="#444444">Control-plane registry</text>

  <ellipse cx="1122" cy="731" rx="7" ry="5" fill="#f0f0f0" stroke="#999999" stroke-width="1"/>
  <text x="1135" y="734" font-size="9" fill="#444444">Authoritative object (in Tenant DB)</text>

  <rect x="1115" y="742" width="14" height="10" fill="#fce4ec" stroke="#e57373" stroke-width="1"/>
  <text x="1135" y="752" font-size="9" fill="#444444">Proof emission (Evidence + Lineage)</text>

  <line x1="1115" y1="765" x2="1129" y2="765" stroke="#333333" stroke-width="2"/>
  <text x="1135" y="768" font-size="9" fill="#444444">Direct dependency at the act</text>

  <line x1="1115" y1="780" x2="1129" y2="780" stroke="#999999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1135" y="783" font-size="9" fill="#444444">Mediated or governed reference</text>

  <text x="1115" y="810" font-size="9" font-style="italic" fill="#666666">State changes only at the four</text>
  <text x="1115" y="824" font-size="9" font-style="italic" fill="#666666">boundaries. Read access never</text>
  <text x="1115" y="838" font-size="9" font-style="italic" fill="#666666">triggers evaluation.</text>

  <!-- Footer -->
  <text x="700" y="930" font-size="10" font-style="italic" fill="#666666" text-anchor="middle">The platform does not decide. It evaluates, measures, records, and surfaces. Decisions and acts belong to the tenant operator.</text>
  <text x="700" y="950" font-size="9" fill="#999999" text-anchor="middle">Governing source: Foundation; The Object Model; The Evaluation Boundaries; Operating Model.</text>
</svg>
